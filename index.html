<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHRONOS | Evolução Humana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Pular para o conteúdo</a>

    <header role="banner" class="header">
        <nav class="a11y-bar" aria-label="Ferramentas de Acessibilidade">
            <button onclick="changeFontSize('increase')" aria-label="Aumentar fonte">A+</button>
            <button onclick="changeFontSize('decrease')" aria-label="Diminuir fonte">A-</button>
            <button id="contrast-toggle" aria-label="Alternar alto contraste">Inverter Cores</button>
        </nav>
        
        <div class="hero">
            <h1 class="reveal">CHRONOS</h1>
            <p class="reveal">Uma odisseia pela tecnologia e inovação.</p>
        </div>
    </header>

    <main id="main-content">
        <section id="timeline" aria-labelledby="timeline-title">
            <h2 id="timeline-title" class="section-title">Marcos Históricos</h2>
            <div id="dynamic-grid" class="grid-container">
                </div>
        </section>

        <section id="faq" aria-labelledby="faq-title">
            <h2 id="faq-title" class="section-title">Perguntas Frequentes</h2>
            <div id="accordion-root" class="accordion-container">
                </div>
        </section>
    </main>

    <footer role="contentinfo" class="footer">
        <p>&copy; 2026 Projeto Chronos - Full-Stack & Accessibility Focused.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
