<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linha do Tempo das Descobertas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <header>
        <div class="header-content">
            <h1>Linha do Tempo das Descobertas</h1>
            <p>A evolução da humanidade através do tempo</p>
            <input type="text" id="search-input" placeholder="Pesquisar descoberta...">
        </div>
        <nav class="accessibility-bar">
            <button id="toggle-contrast">🌓 Contraste</button>
            <button id="font-down">A-</button>
            <button id="font-up">A+</button>
        </nav>
    </header>
    <main>
        <div class="filter-wrapper">
            <button class="filter-btn active" data-filter="todos">Todos</button>
            <button class="filter-btn" data-filter="tecnologia">Tecnologia</button>
            <button class="filter-btn" data-filter="ciencia">Ciência</button>
        </div>
        <section class="timeline">
            <div class="main-line"></div>
            <div id="timeline-render"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
