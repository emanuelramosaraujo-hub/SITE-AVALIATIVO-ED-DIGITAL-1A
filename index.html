<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHRONOS | Evolução Humana</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Pular para o conteúdo</a>

    <header role="banner">
        <nav class="accessibility-bar" aria-label="Controles de Acessibilidade">
            <button onclick="changeFontSize('increase')" aria-label="Aumentar fonte">A+</button>
            <button onclick="changeFontSize('decrease')" aria-label="Diminuir fonte">A-</button>
            <button id="contrast-toggle" aria-label="Alternar alto contraste">Inverter Contraste</button>
        </nav>
        
        <div class="hero-container">
            <h1>CHRONOS</h1>
            <p>A linha do tempo definitiva das revoluções tecnológicas.</p>
        </div>
    </header>

    <main id="main-content">
        <section id="timeline" aria-labelledby="timeline-title">
            <h2 id="timeline-title" class="sr-only">Descobertas Históricas</h2>
            <div id="dynamic-grid" class="grid-layout">
                </div>
        </section>

        <section id="details" aria-labelledby="details-title">
            <h2 id="details-title">Especificações Técnicas</h2>
            <div id="accordion-container" class="accordion">
                </div>
        </section>
    </main>

    <footer role="contentinfo">
        <p>&copy; 2026 Chronos Project - Foco em UX e Acessibilidade.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
